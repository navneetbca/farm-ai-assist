# helm/farmAiAssist/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "farm-ai-assist.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "farm-ai-assist.fullname" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
