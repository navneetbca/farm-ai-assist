# application-k8s.yml
server:
  port: 8080

spring:
  application:
    name: farm-ai-assist

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:h2:file:/data/chatmemory;AUTO_SERVER=true
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

    vectorstore:
      qdrant:
        host: qdrant.default.svc.cluster.local
        port: 6334
        collection-name: navneet

farmAiAssist:
  service:
    url: http://{{SERVICE_NAME}}:8080
